<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D1B2A">
<title>Styl Doradcy - OMNIRES</title>
<style>
:root{
  --navy:#0D1B2A;
  --gold:#B8964A;
  --cream:#F5F0E8;--cream2:#EDE6D8;--cream3:#E0D8CC;
  --text:#1A1A1A;--text2:#5A5A5A;--text3:#888;
  --C:#B8312F;--Cbg:#FBF0EF;
  --S:#B8820A;--Sbg:#FBF5E6;
  --F:#1E6B3C;--Fbg:#EBF5EF;
  --M:#1D5490;--Mbg:#EBF2FB;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--navy);color:var(--text);overscroll-behavior:none;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#si{background:var(--navy);align-items:center;justify-content:flex-end;position:relative;overflow:hidden;}
.ibg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(184,150,74,.18) 0%,transparent 70%);}
.ideco{position:absolute;top:0;left:0;right:0;height:52vh;display:flex;align-items:center;justify-content:center;}
.icirc{width:min(300px,85vw);height:min(300px,85vw);border-radius:50%;border:1px solid rgba(184,150,74,.22);position:relative;display:flex;align-items:center;justify-content:center;}
.icirc::before{content:'';position:absolute;width:75%;height:75%;border-radius:50%;border:1px solid rgba(184,150,74,.14);}
.icirc::after{content:'';position:absolute;width:50%;height:50%;border-radius:50%;border:1px solid rgba(184,150,74,.1);}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:44%;height:44%;z-index:2;}
.qc{border-radius:5px;opacity:.88;}
.icontent{position:relative;z-index:2;width:100%;background:var(--cream);border-radius:24px 24px 0 0;padding:30px 22px 44px;}
.ieyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:600;}
.ititle{font-size:clamp(24px,7vw,34px);font-weight:700;color:var(--navy);line-height:1.15;margin-bottom:14px;letter-spacing:-.02em;}
.idesc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.imeta{display:flex;gap:20px;margin-bottom:26px;}
.mitem{display:flex;flex-direction:column;gap:2px;}
.mnum{font-size:28px;font-weight:700;color:var(--navy);letter-spacing:-.03em;}
.mlbl{font-size:11px;color:var(--text3);}
.sbtn{width:100%;padding:18px;background:var(--navy);color:var(--cream);border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;position:relative;transition:transform .15s;}
.sbtn:active{transform:scale(.98);}
.sarrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:18px;}
#sq{background:var(--cream);flex-direction:column;}
.qtop{background:var(--navy);padding:18px 20px 22px;flex-shrink:0;}
.qnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qback{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qback:disabled{opacity:.25;cursor:default;}
.qct{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.06em;}
.pwrap{height:2px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
.pfill{height:100%;background:var(--gold);border-radius:999px;transition:width .35s cubic-bezier(.4,0,.2,1);}
.qbody{padding:22px 20px 12px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.qtag{display:inline-flex;align-items:center;gap:5px;background:rgba(184,150,74,.11);border:1px solid rgba(184,150,74,.22);border-radius:999px;padding:5px 12px;font-size:11px;color:var(--gold);margin-bottom:14px;}
.qtext{font-size:clamp(17px,4.5vw,22px);font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:8px;letter-spacing:-.01em;}
.opts{display:flex;flex-direction:column;gap:9px;padding-bottom:100px;}
.opt{padding:15px 16px;background:white;border:1.5px solid transparent;border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--text);line-height:1.5;transition:all .16s;display:flex;align-items:flex-start;gap:11px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.opt:active{transform:scale(.99);}
.oltr{width:24px;height:24px;min-width:24px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);transition:all .16s;}
.opt.sC{border-color:var(--C);background:var(--Cbg);}
.opt.sC .oltr{background:var(--C);color:white;}
.opt.sS{border-color:var(--S);background:var(--Sbg);}
.opt.sS .oltr{background:var(--S);color:white;}
.opt.sF{border-color:var(--F);background:var(--Fbg);}
.opt.sF .oltr{background:var(--F);color:white;}
.opt.sM{border-color:var(--M);background:var(--Mbg);}
.opt.sM .oltr{background:var(--M);color:white;}
.qfoot{position:fixed;bottom:0;left:0;right:0;padding:12px 20px 30px;background:var(--cream);border-top:1px solid var(--cream2);}
.nbtn{width:100%;padding:17px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;transition:all .16s;position:relative;}
.nbtn:disabled{background:#C5BFB5;cursor:default;}
.nbtn:not(:disabled):active{transform:scale(.98);}
.narr{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--gold);}
#sl{background:var(--navy);align-items:center;justify-content:center;flex-direction:column;gap:22px;}
.lring{width:56px;height:56px;border:2px solid rgba(184,150,74,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{font-size:17px;color:rgba(245,240,232,.65);font-style:italic;}
#sr{background:var(--cream);flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.rhero{padding:44px 22px 32px;text-align:center;}
.riconw{width:78px;height:78px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.ricon{font-size:28px;color:white;font-weight:700;line-height:1;}
.reyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;font-weight:600;}
.rname{font-size:clamp(24px,6.5vw,34px);font-weight:700;color:var(--navy);line-height:1.1;margin-bottom:5px;letter-spacing:-.02em;}
.rsub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.rtags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.rtag{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;}
.rsec{padding:0 20px 22px;}
.stitle{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--cream3);}
.blist{display:flex;flex-direction:column;gap:9px;}
.brow{display:flex;flex-direction:column;gap:5px;}
.bhead{display:flex;justify-content:space-between;align-items:center;}
.bname{font-size:13px;color:var(--navy);font-weight:600;}
.bpct{font-size:12px;color:var(--text3);}
.bbg{height:6px;background:var(--cream2);border-radius:999px;overflow:hidden;}
.bfill{height:100%;border-radius:999px;width:0%;transition:width .9s cubic-bezier(.4,0,.2,1);}
.qcard{background:var(--navy);border-radius:var(--r);padding:20px;}
.qmark{font-size:44px;color:var(--gold);opacity:.35;line-height:.7;margin-bottom:8px;font-weight:700;}
.qtext2{font-size:14px;color:rgba(255,255,255,.82);line-height:1.7;font-style:italic;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.scard{background:white;border-radius:var(--rs);padding:13px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.slbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:7px;}
.sitem{font-size:12px;color:var(--text2);padding:4px 0;border-top:1px solid var(--cream2);line-height:1.4;}
.sitem:first-of-type{border-top:none;padding-top:0;}
.dlist{display:flex;flex-direction:column;gap:7px;}
.ditem{background:white;border-radius:var(--rs);padding:13px 14px;font-size:13px;color:var(--text2);line-height:1.5;display:flex;gap:9px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.darr{color:var(--gold);font-size:13px;flex-shrink:0;margin-top:2px;}
.cgrid{display:flex;flex-direction:column;gap:8px;}
.ccard{border-radius:var(--rs);padding:13px 15px;}
.cclbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.cctext{font-size:13px;color:var(--text2);line-height:1.5;}
.ract{padding:4px 20px 50px;display:flex;flex-direction:column;gap:9px;}
.abtn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s;}
.abtn:active{transform:scale(.98);}
.abtn-sec{background:white;color:var(--navy);border:1.5px solid var(--cream3);}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.a{animation:fu .32s ease both;}
.a1{animation-delay:.06s;}.a2{animation-delay:.12s;}.a3{animation-delay:.18s;}.a4{animation-delay:.24s;}
</style>
</head>
<body>

<div class="screen" id="sl">
  <div class="lring"></div>
  <div class="ltxt">Analizuję Twój profil…</div>
</div>

<div class="screen active" id="si">
  <div class="ibg"></div>
  <div class="ideco">
    <div class="icirc">
      <div class="qgrid">
        <div class="qc" style="background:#B8312F"></div>
        <div class="qc" style="background:#B8820A"></div>
        <div class="qc" style="background:#1E6B3C"></div>
        <div class="qc" style="background:#1D5490"></div>
      </div>
    </div>
  </div>
  <div class="icontent">
    <div class="ieyebrow">OMNIRES · Szkolenie PCE</div>
    <h1 class="ititle">Jaki masz styl osobowości jako doradca?</h1>
    <p class="idesc">10 sytuacji z codziennej pracy w showroomie. Wybieraj szczerze — pierwsza myśl jest zwykle najtrafniejsza.</p>
    <div class="imeta">
      <div class="mitem"><span class="mnum">10</span><span class="mlbl">pytań</span></div>
      <div class="mitem"><span class="mnum">4</span><span class="mlbl">style</span></div>
      <div class="mitem"><span class="mnum">~4'</span><span class="mlbl">czas</span></div>
    </div>
    <button class="sbtn" id="start-btn">Rozpocznij test <span class="sarrow">→</span></button>
  </div>
</div>

<div class="screen" id="sq">
  <div class="qtop">
    <div class="qnav">
      <button class="qback" id="btn-back">←</button>
      <span class="qct" id="qct">1 / 10</span>
      <div style="width:36px"></div>
    </div>
    <div class="pwrap"><div class="pfill" id="prog" style="width:0%"></div></div>
  </div>
  <div class="qbody" id="qbody"></div>
  <div class="qfoot">
    <button class="nbtn" id="btn-next">Wybierz odpowiedź <span class="narr">→</span></button>
  </div>
</div>

<div class="screen" id="sr"></div>

      "Przy Niebieskim Detektywie i Czerwonej Błyskawicy — skróć narrację, daj fakty",

    ],

  },
  F: {

    nat: "Zielony Przyjaciel po stronie klienta, ostrożny Klient Indywidualny — cenią spokój i rzetelność",

  M: {

    str: [

      { lbl: "Twój język", items: ["Dokładnie to sprawdzę.", "Mam szczegółowe porównanie.", "Warto zwrócić uwagę na...", "Merytoryczny i precyzyjny"] }
    ],
    dev: [
      "Ćwicz narrację emocjonalną — Klient Indywidualny kupuje uczuciem",

      "Przy Żółtym Showmanie i Zielonym Przyjacielu: zacznij od emocji, dane daj potem",
      "Follow-up nie musi być perfekcyjny, żeby być wartościowy — wyślij"
    ],
    nat: "Niebieski Detektyw po stronie klienta, Architekt, Deweloper — cenią ekspertyzę i precyzję",
    chal: "Żółty Showman — potrzebuje energii i opowieści, nie dokumentacji"

};

var cur = 0;
var ans = [];
var ltrs = ['A', 'B', 'C', 'D'];
var tnames = {
  C: "Czerwona B\u0142yskawica",
  S: "\u017b\u00f3\u0142ty Showman",
  F: "Zielony Przyjaciel",
  M: "Niebieski Detektyw"
};

function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) { all[i].classList.remove('active'); }
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startTest() {
  ans = [];
  for (var i = 0; i < Q.length; i++) { ans.push(null); }
  cur = 0;
  show('sq');
  renderQ();
}

function renderQ() {
  var q = Q[cur];
  document.getElementById('qct').textContent = (cur + 1) + ' / ' + Q.length;
  document.getElementById('prog').style.width = Math.round(cur / Q.length * 100) + '%';
  document.getElementById('btn-back').disabled = (cur === 0);
  var nb = document.getElementById('btn-next');
  nb.disabled = (ans[cur] === null);
  nb.innerHTML = (cur === Q.length - 1 ? 'Zobacz sw\u00f3j profil' : 'Nast\u0119pne pytanie') + ' <span class="narr">&#8594;</span>';

  var html = '';
  html += '<div class="qtag">' + esc(q.s) + '</div>';
  html += '<div class="qtext">' + esc(q.t) + '</div>';
  html += '<div class="opts">';
  for (var i = 0; i < q.o.length; i++) {
    var sel = (ans[cur] === i);
    html += '<div class="opt' + (sel ? ' s' + q.o[i].y : '') + '" data-i="' + i + '" data-y="' + q.o[i].y + '">';
    html += '<div class="oltr">' + ltrs[i] + '</div>';
    html += '<div>' + esc(q.o[i].t) + '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('qbody').innerHTML = html;

  var opts = document.getElementById('qbody').querySelectorAll('.opt');
  for (var j = 0; j < opts.length; j++) {
    (function(el) {
      el.addEventListener('click', function() {
        pick(parseInt(el.getAttribute('data-i')), el.getAttribute('data-y'));
      });
    })(opts[j]);
  }
}

function pick(i, y) {
  ans[cur] = i;
  var opts = document.getElementById('qbody').querySelectorAll('.opt');
  for (var k = 0; k < opts.length; k++) {
    opts[k].className = 'opt' + (k === i ? ' s' + y : '');
  }
  var nb = document.getElementById('btn-next');
  nb.disabled = false;
  nb.innerHTML = (cur === Q.length - 1 ? 'Zobacz sw\u00f3j profil' : 'Nast\u0119pne pytanie') + ' <span class="narr">&#8594;</span>';
}

function nextQ() {
  if (ans[cur] === null) { return; }
  if (cur === Q.length - 1) { calcResult(); return; }
  cur++;
  renderQ();
  document.getElementById('qbody').scrollTop = 0;
}

function prevQ() {
  if (cur === 0) { return; }
  cur--;
  renderQ();
}

function calcResult() {
  show('sl');
  setTimeout(buildResult, 1400);
}

function buildResult() {
  var counts = { C: 0, S: 0, F: 0, M: 0 };
  for (var i = 0; i < Q.length; i++) {
    if (ans[i] !== null) { counts[Q[i].o[ans[i]].y]++; }
  }
  var sorted = [['C', counts.C], ['S', counts.S], ['F', counts.F], ['M', counts.M]];
  sorted.sort(function(a, b) { return b[1] - a[1]; });
  var top = sorted[0][0];
  var T = TYPES[top];
  var total = Q.length;

  var barsHtml = '';
  for (var i = 0; i < sorted.length; i++) {
    var key = sorted[i][0], val = sorted[i][1];
    var pct = Math.round(val / total * 100);
    var tc = TYPES[key].col;
    barsHtml += '<div class="brow">';
    barsHtml += '<div class="bhead"><span class="bname" style="color:' + tc + '">' + tnames[key] + '</span><span class="bpct">' + val + '/' + total + ' &middot; ' + pct + '%</span></div>';
    barsHtml += '<div class="bbg"><div class="bfill" style="background:' + tc + '" data-w="' + pct + '"></div></div>';
    barsHtml += '</div>';
  }

  var strHtml = '';
  for (var i = 0; i < T.str.length; i++) {
    var s = T.str[i];
    var items = '';
    for (var j = 0; j < s.items.length; j++) { items += '<div class="sitem">' + s.items[j] + '</div>'; }
    strHtml += '<div class="scard"><div class="slbl" style="color:' + T.col + '">' + s.lbl + '</div>' + items + '</div>';
  }

  var devHtml = '';
  for (var i = 0; i < T.dev.length; i++) {
    devHtml += '<div class="ditem"><span class="darr">&#8594;</span><span>' + T.dev[i] + '</span></div>';
  }

  var tagsHtml = '';
  for (var i = 0; i < T.tags.length; i++) {
    tagsHtml += '<span class="rtag" style="background:' + T.col + '18;color:' + T.col + ';border:1px solid ' + T.col + '28">' + T.tags[i] + '</span>';
  }

  var html = '';
  html += '<div class="rhero a" style="background:' + T.bg + '">';
  html += '<div class="riconw" style="background:' + T.col + '"><div class="ricon">' + T.ltr + '</div></div>';
  html += '<div class="reyebrow a">Tw\u00f3j styl doradcy</div>';
  html += '<div class="rname a a1">' + T.name + '</div>';
  html += '<div class="rsub a a2">' + T.sub + '</div>';
  html += '<div class="rtags a a3">' + tagsHtml + '</div>';
  html += '</div>';
  html += '<div class="rsec a a2"><div class="stitle">Rozk\u0142ad wynik\u00f3w</div><div class="blist">' + barsHtml + '</div></div>';
  html += '<div class="rsec a a3"><div class="stitle">Tw\u00f3j profil doradcy</div>';
  html += '<div class="qcard"><div class="qmark">&ldquo;</div><div class="qtext2">' + T.quote + '</div></div></div>';
  html += '<div class="rsec a a4"><div class="stitle">Mocne strony w showroomie</div><div class="sgrid">' + strHtml + '</div></div>';
  html += '<div class="rsec"><div class="stitle">Co warto \u0107wiczy\u0107</div><div class="dlist">' + devHtml + '</div></div>';
  html += '<div class="rsec"><div class="stitle">Dopasowanie do klienta</div><div class="cgrid">';
  html += '<div class="ccard" style="background:' + T.col + '12;border:1px solid ' + T.col + '25"><div class="cclbl" style="color:' + T.col + '">Tw\u00f3j naturalny klient</div><div class="cctext">' + T.nat + '</div></div>';
  html += '<div class="ccard" style="background:#FFF3F3;border:1px solid #ECC"><div class="cclbl" style="color:#B33">Klient &mdash; wyzwanie</div><div class="cctext">' + T.chal + '</div></div>';
  html += '</div></div>';
  html += '<div class="ract">';
  html += '<button class="abtn" id="share-btn" style="background:' + T.col + ';color:white">Poka\u017c wynik trenerowi</button>';
  html += '<button class="abtn abtn-sec" id="reset-btn">Zr\u00f3b test jeszcze raz</button>';
  html += '</div>';

  document.getElementById('sr').innerHTML = html;
  show('sr');

  document.getElementById('share-btn').addEventListener('click', function() { shareRes(top); });
  document.getElementById('reset-btn').addEventListener('click', resetTest);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var fills = document.querySelectorAll('.bfill');
      for (var i = 0; i < fills.length; i++) {
        fills[i].style.width = fills[i].getAttribute('data-w') + '%';
      }
    });
  });
}

function shareRes(type) {
  var txt = 'M\u00f3j styl doradcy: ' + tnames[type] + ' \u2014 test PCE OMNIRES';
  if (navigator.share) {
    navigator.share({ title: 'M\u00f3j styl doradcy', text: txt });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() { alert('Skopiowano! Poka\u017c trenerowi.'); });
  } else {
    alert('Tw\u00f3j wynik:\n' + txt);
  }
}

function resetTest() {
  ans = [];
  cur = 0;
  show('si');
}

document.getElementById('start-btn').addEventListener('click', startTest);
document.getElementById('btn-back').addEventListener('click', prevQ);
document.getElementById('btn-next').addEventListener('click', nextQ);

})();
</script>
</body>
</html>
